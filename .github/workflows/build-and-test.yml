name: Build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  complete:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v2
    - name: Setup k3s
      uses: debianmaster/actions-k3s@master
      with:
        version: 'v1.28.5-k3s1'
    - name: Setup Gateway API + traefik gateway
      run: |
        set -euo pipefail
        # Gateway API standard CRDs (gateway.networking.k8s.io/v1 HTTPRoute is GA in v1.0+).
        kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.1.0/standard-install.yaml
        # Traefik as the Gateway API controller, exposing the web entrypoint on :80 via k3s servicelb.
        helm repo add traefik https://traefik.github.io/charts
        helm repo update
        kubectl create namespace traefik
        # k3s bundles its own traefik in kube-system; isolate ours (distinct name,
        # no IngressClass) so it only provides the gateway-api controller.
        helm install ssc-traefik traefik/traefik -n traefik \
          --set fullnameOverride=ssc-traefik \
          --set ingressClass.enabled=false \
          --set providers.kubernetesGateway.enabled=true \
          --set gateway.enabled=false \
          --set service.type=LoadBalancer \
          --set ports.web.exposedPort=80 \
          --wait
        # GatewayClass + the private gateway the missions attach to (matches CfgVal.gatewayName / gatewayNamespace).
        kubectl apply -f - <<'YAML'
        apiVersion: gateway.networking.k8s.io/v1
        kind: GatewayClass
        metadata:
          name: traefik
        spec:
          controllerName: traefik.io/gateway-controller
        ---
        apiVersion: gateway.networking.k8s.io/v1
        kind: Gateway
        metadata:
          name: traefik-gateway-private
          namespace: traefik
        spec:
          gatewayClassName: traefik
          listeners:
          - name: web
            port: 8000
            protocol: HTTP
            allowedRoutes:
              namespaces:
                from: All
        YAML
        kubectl wait --namespace traefik --for=condition=Programmed gateway/traefik-gateway-private --timeout=180s
    - name: Setup .NET SDK 8
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: '8.0.x'
    - name: Install dependencies
      run: dotnet restore
    - name: Install tool dependencies
      run: dotnet tool restore
    - name: Check formatting
      run: dotnet tool run fantomas --check --recurse src
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Test
      run: dotnet test --no-restore --verbosity normal
    - name: Run BootAndSync mission
      run: dotnet run --project src/App/App.fsproj --configuration Release -- mission BootAndSync --image stellar/stellar-core:stable --kubeconfig $KUBECONFIG --namespace default --ingress-internal-domain local --ingress-external-host localhost --uneven-sched
    - uses: actions/upload-artifact@v4
      with:
        name: destination
        path: destination/
        retention-days: 30
