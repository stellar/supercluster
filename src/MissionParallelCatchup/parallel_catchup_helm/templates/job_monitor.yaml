apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-job-monitor-route
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: "{{ .Values.monitor.gateway_name }}"
    namespace: "{{ .Values.monitor.gateway_namespace }}"
  hostnames:
  - "{{ .Values.monitor.hostname }}"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "{{ .Values.monitor.path_prefix }}"
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: {{ .Release.Name }}-job-monitor
      port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-job-monitor
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: {{ .Release.Name }}-job-monitor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-job-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-job-monitor
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-job-monitor
      annotations:
        # Add annotations to tell prometheus service discovery to scrape metrics.
        # In k8s clusters without prometheus the annotations will be dormant
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/prometheus"
    spec:
      containers:
      - name: job-monitor
        image: stellar/ssc-job-monitor:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: "{{ .Values.monitor.resources.requests.cpu}}"
            memory: "{{ .Values.monitor.resources.requests.memory}}"
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        envFrom:
        - configMapRef:
            name: {{ .Release.Name }}-job-monitor-config
      initContainers:
      - name: wait-for-preload
        image: redis:7
        command: ['/bin/sh', '-c']
        args:
        - |-
          # Wait until the job queue has items
          until [ $(redis-cli -h {{ .Values.redis.hostname }} -p {{ .Values.redis.port }} LLEN {{ .Values.redis.job_queue }}) -gt 0 ]; do
            echo waiting for preload
            sleep 2
          done
          echo job available
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-job-monitor-config
data:
  REDIS_HOST: "{{ .Values.redis.hostname }}"
  REDIS_PORT: "{{ .Values.redis.port }}"
  JOB_QUEUE: "{{ .Values.redis.job_queue }}"
  SUCCESS_QUEUE: "{{ .Values.redis.success_queue }}"
  FAILED_QUEUE: "{{ .Values.redis.failed_queue }}"
  PROGRESS_QUEUE: "{{ .Values.redis.progress_queue }}"
  METRICS: "{{ .Values.redis.metrics }}"
  JOB_OWNERS: "{{ .Values.redis.job_owners }}"
  WORKER_PREFIX: "{{ .Release.Name }}-stellar-core"
  WORKER_COUNT: "{{ .Values.worker.replicas }}"
  LOGGING_INTERVAL_SECONDS: "{{ .Values.monitor.logging_interval_seconds }}"
  LOGGING_LEVEL: "{{ .Values.monitor.logging_level }}"
